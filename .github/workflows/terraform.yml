name: Deploy AWS EC2 Demo

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: string
      instance_type:
        description: "EC2 instance type"
        required: true
        default: "t2.micro"
        type: string
      allowed_http_cidr:
        description: "CIDR allowed to access the demo website"
        required: true
        default: "0.0.0.0/0"
        type: string

permissions:
  contents: read

concurrency:
  group: terraform-ec2-demo
  cancel-in-progress: false

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'apply' || inputs.action }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      AWS_REGION: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-south-1' }}
      TF_VAR_aws_region: ${{ inputs.aws_region || vars.AWS_REGION || 'ap-south-1' }}
      TF_VAR_instance_type: ${{ inputs.instance_type || vars.EC2_INSTANCE_TYPE || 't2.micro' }}
      TF_VAR_allowed_http_cidr: ${{ inputs.allowed_http_cidr || vars.ALLOWED_HTTP_CIDR || '0.0.0.0/0' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=launch-tech-journey/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        if: github.event_name == 'push' || inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' || inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Deploy website to existing EC2 instance
        if: github.event_name == 'push' || inputs.action == 'apply'
        run: |
          INSTANCE_ID="$(terraform output -raw instance_id)"

          for attempt in {1..30}; do
            SSM_STATUS="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text)"

            if [ "${SSM_STATUS}" = "Online" ]; then
              break
            fi

            if [ "${attempt}" -eq 30 ]; then
              echo "EC2 instance did not become available in Systems Manager."
              exit 1
            fi

            sleep 10
          done

          SCRIPT_BASE64="$(base64 < user_data.sh | tr -d '\n')"
          PARAMETERS="$(jq -cn --arg script "${SCRIPT_BASE64}" \
            '{commands: ["echo " + $script + " | base64 -d > /tmp/deploy-website.sh", "chmod +x /tmp/deploy-website.sh", "/tmp/deploy-website.sh"]}')"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy website from GitHub Actions" \
            --parameters "${PARAMETERS}" \
            --query 'Command.CommandId' \
            --output text)"

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}"

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'

      - name: Terraform Output
        if: github.event_name == 'push' || inputs.action == 'apply'
        run: terraform output -no-color

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform destroy -auto-approve
